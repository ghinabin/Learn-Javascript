<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter App — Project 02</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h2>Counter</h2>

    <!-- The number display — JavaScript will update this -->
    <div id="count" class="count">0</div>

    <!-- Three buttons: decrement, reset, increment -->
    <div class="controls">
      <button id="btn-decrement" class="btn btn-minus">−</button>
      <button id="btn-reset"     class="btn btn-reset">Reset</button>
      <button id="btn-increment" class="btn btn-plus">+</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
